<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#f1c40f" stroke-width="2.5"/>
  <!-- 剑 (crossed swords) -->
  <g transform="translate(32,28)">
    <!-- 左剑 -->
    <path d="M-4,-16 L-6,12 L-2,12 L0,-16 Z" fill="#95a5a6"/>
    <rect x="-7" y="12" width="6" height="2" rx="1" fill="#D4A017"/>
    <!-- 右剑 -->
    <path d="M4,-16 L2,12 L6,12 L8,-16 Z" fill="#95a5a6"/>
    <rect x="1" y="12" width="6" height="2" rx="1" fill="#D4A017"/>
    <!-- 剑柄圆 -->
    <circle cx="-4" cy="15" r="2" fill="#D4A017"/>
    <circle cx="4" cy="15" r="2" fill="#D4A017"/>
    <!-- 中间菱形 -->
    <polygon points="0,-20 4,-16 0,4 -4,-16" fill="#f1c40f" opacity="0.8"/>
  </g>
  <!-- 底部文字装饰 -->
  <text x="32" y="54" font-size="8" text-anchor="middle" fill="#f1c40f" font-family="monospace">TR</text>
</svg>
